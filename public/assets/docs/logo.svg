<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .core {
      animation: pulse 4s ease-in-out infinite;
      transform-origin: center;
    }
    .ring {
      animation: spin 10s linear infinite;
      transform-origin: center;
    }
    .ring-reverse {
      animation: spin 15s linear infinite reverse;
      transform-origin: center;
    }
  </style>
  
  <!-- Outer Rings -->
  <circle cx="100" cy="100" r="85" stroke="#10B981" stroke-width="0.5" stroke-opacity="0.2" />
  <circle cx="100" cy="100" r="75" stroke="#06B6D4" stroke-width="2" stroke-opacity="0.4" class="ring" stroke-dasharray="40 20" />
  <circle cx="100" cy="100" r="65" stroke="#10B981" stroke-width="1" stroke-opacity="0.3" class="ring-reverse" stroke-dasharray="10 30" />
  
  <!-- Geometric "DT" Core -->
  <g class="core">
    <!-- The "D" shape -->
    <path d="M70 70 V130 H100 C116.569 130 130 116.569 130 100 C130 83.4315 116.569 70 100 70 H70Z" stroke="url(#logoGrad)" stroke-width="4" fill="url(#logoGrad)" fill-opacity="0.1" />
    <!-- Inner pulse -->
    <circle cx="100" cy="100" r="10" fill="#FFF" fill-opacity="0.8">
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
