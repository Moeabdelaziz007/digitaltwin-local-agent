<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    @keyframes flow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .grid-line { stroke: #10B981; stroke-opacity: 0.1; }
    .glow { filter: blur(4px); }
    .scan-line {
      stroke: #06B6D4;
      stroke-width: 2;
      animation: scan 4s linear infinite;
    }
    .data-path {
      stroke: #10B981;
      stroke-dasharray: 10 5;
      animation: flow 2s linear infinite;
    }
    .orbit {
      transform-origin: center;
      animation: rotate 20s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="300" fill="#000" />
  
  <!-- Perspective Grid -->
  <g transform="translate(0, 50)">
    <path d="M0 250 L1200 250" class="grid-line" />
    <path d="M0 200 L1200 200" class="grid-line" />
    <path d="M0 150 L1200 150" class="grid-line" />
    <path d="M0 100 L1200 100" class="grid-line" />
    
    <path d="M600 0 L0 300" class="grid-line" />
    <path d="M600 0 L200 300" class="grid-line" />
    <path d="M600 0 L400 300" class="grid-line" />
    <path d="M600 0 L600 300" class="grid-line" />
    <path d="M600 0 L800 300" class="grid-line" />
    <path d="M600 0 L1000 300" class="grid-line" />
    <path d="M600 0 L1200 300" class="grid-line" />
  </g>

  <!-- Center Piece -->
  <g transform="translate(600, 150)">
    <circle r="80" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.2" fill="none" />
    <circle r="60" stroke="#10B981" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-dasharray="20 10" class="orbit" />
    
    <!-- Text Elements -->
    <text x="0" y="10" text-anchor="middle" fill="#FFF" font-family="monospace" font-weight="bold" font-size="32" style="letter-spacing: 0.5em;">
      VENTURE LAB
    </text>
    <text x="0" y="35" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="12" style="letter-spacing: 0.2em; opacity: 0.6;">
      MAS-ZERO :: V3.5
    </text>
  </g>

  <!-- Side Assets -->
  <g transform="translate(100, 100)" class="orbit">
     <rect width="40" height="40" stroke="#06B6D4" stroke-width="1" fill="none" />
     <circle cx="20" cy="20" r="15" fill="url(#grad1)" />
  </g>
  
  <g transform="translate(1000, 180)" style="animation: pulse 3s infinite;">
     <path d="M0 0 L30 -20 L60 0 L30 20 Z" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="1" />
  </g>

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
