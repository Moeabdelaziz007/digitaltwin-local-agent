name: MAS-ZERO Agent Economy Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # TIER 1: Security & Quality
  quality-gate:
    name: 🛡️ Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install -g pnpm && pnpm install
      - name: Sentinel Scan
        run: chmod +x scripts/gatekeeper.sh && ./scripts/gatekeeper.sh

  # TIER 2: Build & Unit Tests
  build-and-test:
    name: 🏗️ Build & Test
    needs: quality-gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [frontend, sidecar]
    steps:
      - uses: actions/checkout@v4
      
      # Frontend Build
      - name: Build Frontend
        if: matrix.component == 'frontend'
        run: |
          npm install -g pnpm
          pnpm install
      - name: 🛡️ Type Check
        if: matrix.component == 'frontend'
        run: pnpm run typecheck

      - name: 🧹 Lint Check
        if: matrix.component == 'frontend'
        run: pnpm run lint

      - name: 🏗️ Build App
        if: matrix.component == 'frontend'
        run: pnpm run build
      
      # Sidecar Build & Artifact
      - name: Build Sidecar
        if: matrix.component == 'sidecar'
        run: |
          cd sidecar
          go mod download
          go build -o twin-worker-bin ./main.go
      - name: Upload Sidecar Artifact
        if: matrix.component == 'sidecar'
        uses: actions/upload-artifact@v4
        with:
          name: venture-sidecar-binary
          path: sidecar/twin-worker-bin

  # TIER 3: Deployment (Preview Only on PR)
  deploy-preview:
    name: 🚀 Deploy Preview
    if: github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--preview'

  # TIER 4: E2E & Visual Regression
  e2e-visual:
    name: 👁️ E2E & Visual
    if: github.event_name == 'pull_request'
    needs: deploy-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install -g pnpm && pnpm install
      
      - name: Playwright E2E
        run: npx playwright install --with-deps && npx playwright test
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}

      - name: Meticulous Visual Regression
        uses: Meticulous-AI/meticulous-action@v1
        with:
          api-token: ${{ secrets.METICULOUS_API_TOKEN }}
          preview-url: ${{ needs.deploy-preview.outputs.preview_url }}
