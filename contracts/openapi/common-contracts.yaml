openapi: 3.1.0
info:
  title: Common Contracts
  version: 1.0.0
  description: Shared schemas for the Digital Twin API ecosystem.

components:
  schemas:
    ResponseEnvelope:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: object
          description: The primary response payload.
        meta:
          type: object
          properties:
            traceId:
              type: string
              format: uuid
            timestamp:
              type: string
              format: date-time
        error:
          $ref: '#/components/schemas/ErrorSchema'

    ErrorSchema:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: A machine-readable error code (e.g., UNAUTHORIZED).
        message:
          type: string
          description: A human-readable error description.
        details:
          type: object
          description: Additional structured error context.

    AuthRequirement:
      type: object
      properties:
        Authorization:
          type: string
          description: Bearer token (Clerk JWT).
