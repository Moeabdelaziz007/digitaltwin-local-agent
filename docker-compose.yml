# MyDigitalTwin LiveKit Infrastructure
# Optimized for local low-latency WebRTC
services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    command: --config /etc/livekit.yaml
    restart: always
    ports:
      - "7880:7880"   # HTTP/WebSocket API
      - "7881:7881"   # TCP fallback
      - "7882:7882/udp" # WebRTC UDP
      - "3478:3478/udp" # TURN
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    environment:
      - LIVEKIT_KEYS=devkey: secretsecret  # Placeholder: change for production
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: livekit-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"

  pocketbase:
    image: muchobien/pocketbase:latest
    container_name: dmt-pocketbase
    ports:
      - "8090:8080"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_migrations:/pb_migrations
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: dmt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always
